<div class="music-tool-container">
  <h2>簡易ギターチューナー ＆ メトロノーム</h2>
  
  <div class="section-title">ギター用開放弦チューナー (レギュラーチューニング)</div>
  
  <div class="guitar-head">
    <div class="neck-line"></div>
    <div class="peg-container left-pegs">
      <button class="peg-btn" onclick="playTone(82.41, this)"><span>6E</span><small>82Hz</small></button>
      <button class="peg-btn" onclick="playTone(110.00, this)"><span>5A</span><small>110Hz</small></button>
      <button class="peg-btn" onclick="playTone(146.83, this)"><span>4D</span><small>147Hz</small></button>
    </div>
    <div class="head-wood">
      <div class="logo">TUNER</div>
    </div>
    <div class="peg-container right-pegs">
      <button class="peg-btn" onclick="playTone(196.00, this)"><span>3G</span><small>196Hz</small></button>
      <button class="peg-btn" onclick="playTone(246.94, this)"><span>2B</span><small>247Hz</small></button>
      <button class="peg-btn" onclick="playTone(329.63, this)"><span>1E</span><small>330Hz</small></button>
    </div>
  </div>

  <hr class="tool-divider">

  <!-- 真ん中辺りへのブログリンク挿入箇所 -->
  <p style="text-align: center; margin-top: 15px; margin-bottom: 25px; font-size: 0.9em;">
    このツールの詳しい解説：<a href="https://music.net-meme.com/" target="_blank" style="color: #2ecc71; text-decoration: underline;">ひろぶろＤＪミュージック</a>
  </p>

  <div class="section-title">簡易メトロノーム</div>
  <div class="metro-container">
    <div class="bpm-display"><span id="bpm-value">120</span> <small>BPM</small></div>
    
    <div class="metro-visual">
      <div id="indicator" class="indicator"></div>
    </div>

    <div class="control-row">
      <input type="range" id="bpm-slider" min="40" max="240" value="120" oninput="updateBPM(this.value)">
    </div>
    
    <button id="metro-toggle-btn" class="metro-btn" onclick="toggleMetronome()">START</button>
  </div>
</div>

<style>

.metro-btn.playing { background: #e53e3e; }

<script>
// Web Audio APIの文脈を管理
let audioCtx = null;
let metroIntervalId = null;
let isPlayingMetro = false;
let bpm = 120;
let currentActiveButton = null;
let metroDirection = 1; // 1: 右移動, -1: 左移動

// AudioContextの初期化（ブラウザのセキュリティ制限対策）
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

// 1. チューナー機能：指定された周波数の音を鳴らす（サイン波）
function playTone(frequency, button) {
  initAudio();
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  // すでにアクティブなボタンがあれば解除
  if (currentActiveButton) {
    currentActiveButton.classList.remove('active');
  }

  // 同じボタンが押されたら音を止める処理
  if (currentActiveButton === button) {
    currentActiveButton = null;
    return;
  }

  button.classList.add('active');
  currentActiveButton = button;

  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();

  osc.type = 'triangle'; 
  osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

  gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3.0);

  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 3.0);

  setTimeout(() => {
    if (currentActiveButton === button) {
      button.classList.remove('active');
      currentActiveButton = null;
    }
  }, 3000);
}

// 2. メトロノーム機能
function updateBPM(val) {
  bpm = val;
  document.getElementById('bpm-value').innerText = val;
  if (isPlayingMetro) {
    stopMetronomeTimer();
    startMetronomeTimer();
  }
}

function toggleMetronome() {
  initAudio();
  const btn = document.getElementById('metro-toggle-btn');
  
  if (isPlayingMetro) {
    stopMetronomeTimer();
    btn.innerText = "START";
    btn.classList.remove('playing');
    isPlayingMetro = false;
  } else {
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    startMetronomeTimer();
    btn.innerText = "STOP";
    btn.classList.add('playing');
    isPlayingMetro = true;
  }
}

function startMetronomeTimer() {
  const interval = (60 / bpm) * 1000;
  
  playTick();
  animateIndicator();

  metroIntervalId = setInterval(() => {
    playTick();
    animateIndicator();
  }, interval);
}

function stopMetronomeTimer() {
  if (metroIntervalId) {
    clearInterval(metroIntervalId);
    metroIntervalId = null;
  }
  document.getElementById('indicator').style.transform = 'translateX(0px)';
  metroDirection = 1;
}

function playTick() {
  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();

  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);

  gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);

  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

function animateIndicator() {
  const indicator = document.getElementById('indicator');
  if (metroDirection === 1) {
    indicator.style.transform = 'translateX(280px)';
    metroDirection = -1;
  } else {
    indicator.style.transform = 'translateX(0px)';
    metroDirection = 1;
  }
}
</script>
